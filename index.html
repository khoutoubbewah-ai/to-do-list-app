<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple To-Do List App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="todo-card">
      <p class="eyebrow">Simple To-Do List App</p>
      <h1>Plan your day with a calm task board</h1>
      <p class="intro">
        Add small goals, mark them complete, and keep your list clear and focused.
      </p>

      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">Total Tasks</span>
          <strong id="taskCount">0</strong>
        </div>
        <div class="stat-box">
          <span class="stat-label">Completed</span>
          <strong id="completedCount">0</strong>
        </div>
      </div>

      <form id="taskForm" class="task-form">
        <label for="taskInput" class="sr-only">Enter a task</label>
        <input
          id="taskInput"
          name="taskInput"
          type="text"
          placeholder="Enter a new task..."
          maxlength="80"
          required
        >
        <button type="submit" class="primary-btn">Add Task</button>
      </form>

      <p id="message" class="message" aria-live="polite"></p>

      <ul id="taskList" class="task-list" aria-label="To-do tasks"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
